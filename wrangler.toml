name = "mailfree"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "a3d77718-2ce1-4fba-9cab-77afa5b8269c" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"2141083706@qq.com"}]"
ADMIN_NAME="admin"
ADMIN_PASSWORD="aswqee"
GUEST_PASSWORD="guest"
JWT_TOKEN="sdhkjlhfgdsfsfsfhjasdaw"
JWT_TOKENGUEST_PASSWORD="shkljashdkjklsjhdawswadagsd"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="591125.xyz，nodelab.eu.org"
RESEND_API_KEY="re_6KU7EkAx_4kM98XhY1BW9x9rE8nJhME3N"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

